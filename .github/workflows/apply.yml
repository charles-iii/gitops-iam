# .github/workflows/apply.yml
#
# Runs on push to main (i.e., after a PR is approved and merged).
# Authenticates to AWS via OIDC — no static access keys stored anywhere.
# Applies Terraform changes and records the commit SHA in CloudTrail via session tags.

name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read
  id-token: write         # required for OIDC token exchange

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production    # requires environment protection rules in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # OIDC authentication — GitHub exchanges a signed JWT for a short-lived
      # AWS role session. No access key or secret is stored in GitHub Secrets.
      # The trust policy on the role restricts this to main branch only.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Tag the session with commit SHA — this appears in CloudTrail
          # and links every IAM API call back to the specific Git commit
          role-session-name: "gitops-iam-apply-${{ github.sha }}"

      - name: Terraform init
        working-directory: terraform/
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: terraform/
        run: |
          terraform apply \
            -var="environment=prod" \
            -var="github_org=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}" \
            -var="security_account_id=${{ secrets.SECURITY_ACCOUNT_ID }}" \
            -auto-approve \
            -input=false

      - name: Record apply in audit log
        if: always()
        run: |
          echo "APPLY RECORD" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ALERT] Terraform apply failed — commit ${{ github.sha }}`,
              body: `Terraform apply failed on merge to main.\n\n` +
                    `**Commit:** ${{ github.sha }}\n` +
                    `**Actor:** ${{ github.actor }}\n` +
                    `**Time:** ${new Date().toISOString()}\n\n` +
                    `[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['incident', 'iam', 'terraform']
            });
